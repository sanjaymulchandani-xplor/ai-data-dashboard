version: "3.8"

networks:
  ai_data_dashboard:
    driver: bridge

volumes:
  ai_data_dashboard_dev:

services:
  backend:
    build:
      context: .
      target: base
    ports:
      - "7377:7377"
    environment:
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-http://localhost:7377,http://0.0.0.0:7377,http://localhost:5173,http://127.0.0.1:5173}"
      AUTH_USERNAME: "${AUTH_USERNAME}"
      AUTH_PASSWORD: "${AUTH_PASSWORD}"
    working_dir: /home/ai_data_dashboard/backend
    command: ["bash", "-c", "uv run alembic upgrade head && uv run uvicorn ai_data_dashboard.main:app --port=7377 --host=0.0.0.0 --reload"]
    volumes:
      - ai_data_dashboard_dev:/home/.ai_data_dashboard # persist local sqlite db
      - ./backend/ai_data_dashboard:/home/ai_data_dashboard/backend/ai_data_dashboard
      - ./backend/alembic:/home/ai_data_dashboard/backend/alembic
    networks:
      - ai_data_dashboard

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    networks:
      - ai_data_dashboard
